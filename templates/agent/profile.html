{% extends 'base/agent_base.html' %}
{% load static %}

{% block content %}
<div class="flex flex-col md:flex-row">

    <div class="flex-1 p-6">
        <h2 class="text-2xl font-bold text-amber-700 mb-6">My Profile</h2>

        <form method="POST" class="bg-white p-6 rounded-xl shadow space-y-4">
            {% csrf_token %}
            <div>
                <label class="block font-semibold mb-1">Username</label>
                <input type="text" value="{{ request.user.username }}" class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-amber-500" disabled>
            </div>
            <div>
                <label class="block font-semibold mb-1">Email</label>
                <input type="email" name="email" value="{{ request.user.email }}" class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>
            <div>
                <label class="block font-semibold mb-1">Phone Number</label>
                <input type="text" name="phone_number" value="{{ request.user.agent.phone_number }}" class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>

            <button type="submit" class="bg-amber-700 text-white px-4 py-2 rounded hover:bg-amber-800 transition">Update Profile</button>
        </form>
    </div>
</div>
{% endblock %}

{% extends 'base/agent_base.html' %}
{% load static %}

{% block content %}
<div class="flex flex-col md:flex-row">

    <div class="flex-1 p-6">
        <div class="bg-white p-6 rounded-xl shadow text-center">
            <h2 class="text-2xl font-bold text-amber-700 mb-4">Delete Apartment</h2>
            <p class="mb-6">Are you sure you want to delete <strong>{{ apartment.title }}</strong>?</p>
            <form method="POST">
                {% csrf_token %}
                <div class="flex justify-center gap-4">
                    <button type="submit" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 transition">Yes, Delete</button>
                    <a href="{% url 'my_listings' %}" class="bg-gray-300 px-4 py-2 rounded hover:bg-gray-400 transition">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
